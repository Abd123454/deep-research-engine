<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deep Research Engine — Side Panel</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div class="panel">
      <header class="panel-header">
        <div class="brand">
          <span class="brand-logo" aria-hidden="true">
            <svg viewBox="0 0 128 128" width="22" height="22">
              <rect width="128" height="128" rx="28" fill="currentColor" />
              <path fill="#fff" d="M64 24 L72 56 L104 64 L72 72 L64 104 L56 72 L24 64 L56 56 Z" />
              <path fill="#fff" opacity="0.85" d="M96 18 L99 27 L108 30 L99 33 L96 42 L93 33 L84 30 L93 27 Z" />
            </svg>
          </span>
          <div class="brand-text">
            <h1>Deep Research Engine</h1>
            <p id="statusLine" class="status-line">Ready</p>
          </div>
        </div>
        <button class="icon-btn" id="historyToggle" type="button" aria-label="Toggle history" title="History">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M13 3a9 9 0 109 9h-2a7 7 0 11-7-7v3l4-4-4-4v3z"/>
            <path fill="currentColor" d="M12 7h1.5v5.25L17 14l-.75 1.25L12 12V7z"/>
          </svg>
        </button>
      </header>

      <main class="panel-main">
        <!-- Conversation -->
        <div id="messages" class="messages" aria-live="polite" aria-label="Conversation"></div>

        <!-- History drawer (slides in) -->
        <aside id="history" class="history" aria-label="Recent research" hidden>
          <div class="history-head">
            <h2>Recent research</h2>
            <button class="icon-btn" id="historyClose" type="button" aria-label="Close history">
              <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2"/></svg>
            </button>
          </div>
          <div id="historyList" class="history-list">
            <p class="history-empty">No research yet.</p>
          </div>
          <button class="btn btn-link danger" id="clearHistory" type="button">Clear history</button>
        </aside>
      </main>

      <footer class="panel-footer">
        <form id="composer" class="composer" autocomplete="off">
          <textarea
            id="composerInput"
            class="composer-input"
            rows="1"
            placeholder="Ask about this page or anything else…"
          ></textarea>
          <button class="btn btn-primary btn-send" id="sendBtn" type="submit" aria-label="Send">
            <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path fill="currentColor" d="M3 11l18-8-8 18-2-8-8-2z"/>
            </svg>
          </button>
        </form>
        <div class="quick-actions">
          <button class="chip" id="qaResearch" type="button">Research this page</button>
          <button class="chip" id="qaDeep" type="button">Deep research</button>
          <button class="chip" id="qaSwarm" type="button">Swarm</button>
        </div>
      </footer>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
