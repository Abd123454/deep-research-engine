openapi: 3.1.0
info:
  title: Quaesitor API
  version: "1.0.0"
  description: |
    Quaesitor is a self-hostable research, chat, and multi-agent swarm platform
    with a dual-mode database (SQLite + Postgres), cross-provider LLM fallback
    (NVIDIA → OpenAI → Anthropic → Ollama), and a 5-layer memory system.

    Most POST endpoints that stream LLM output use Server-Sent Events
    (`text/event-stream`) with `data: {json}\n\n` framing.

    Authentication is optional and controlled by the `AUTH_USERNAME` and
    `AUTH_PASSWORD` environment variables. When both are set, protected
    endpoints require HTTP Basic auth. When unset, all endpoints are open.
    Rate limiting is applied per-IP via Redis when available, otherwise via
    an in-memory counter.
  contact:
    url: https://github.com/Abd123454/deep-research-engine

servers:
  - url: /
    description: Same-origin (default for the bundled Next.js app)

tags:
  - name: Health
    description: Service health & readiness probes
  - name: Chat
    description: Streaming chat with memory injection and ReAct tool use
  - name: Research
    description: Async deep-research pipeline (plan → search → read → write)
  - name: Swarm
    description: Multi-agent cluster (orchestrator + parallel workers + synth)
  - name: Modal
    description: Quick-mode single-shot LLM responses
  - name: Media
    description: Vision (image analysis), TTS, ASR
  - name: Files
    description: Office document generation
  - name: Sessions
    description: Persisted user sessions (history)
  - name: Eval
    description: Evaluation harness
  - name: Account
    description: GDPR Art. 17 (erasure) and Art. 20 (portability) endpoints
  - name: Consent
    description: GDPR Art. 7 consent ledger (read + update)
  - name: Auth
    description: Authentication — MFA enrollment, verification, and disable
  - name: MCP
    description: Model Context Protocol server marketplace and install state
  - name: Metrics
    description: Admin-only platform KPI dashboard
  - name: Feedback
    description: User feedback (thumbs up/down + free text)
  - name: Docs
    description: This OpenAPI spec

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Liveness & readiness probe
      description: |
        Returns the process uptime, the configured LLM provider, and the
        status of dependent subsystems (database, Postgres if configured,
        and at least one LLM provider). Used by the Docker HEALTHCHECK,
        the desktop wrapper's boot probe, and uptime monitors.

        The overall `status` is one of `"ok"`, `"degraded"`, or `"down"`:
          - `ok`        — every check passed (HTTP 200)
          - `degraded`  — at least one check is degraded, none down (HTTP 200)
          - `down`      — at least one check is down (HTTP 503)

        The `checks` map uses the same vocabulary per-subsystem. The
        `postgres` key is only present when `DATABASE_URL` points at
        Postgres (i.e. in production); in SQLite / in-memory dev mode
        the key is absent and the overall rollup ignores it.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is up (status is `ok` or `degraded`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    checks:
                      database: ok
                      llm: ok
                    timestamp: "2026-07-18T12:00:00.000Z"
                    version: "3.2.0"
                    uptime: 12483
                    uptimeHuman: "12s"
                degraded:
                  value:
                    status: degraded
                    checks:
                      database: ok
                      llm: degraded
                    timestamp: "2026-07-18T12:00:00.000Z"
                    version: "3.2.0"
                    uptime: 12483
                    uptimeHuman: "12s"
        "503":
          description: |
            Service is `down` — at least one critical subsystem (database)
            is unreachable. Retry with exponential backoff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                down:
                  value:
                    status: down
                    checks:
                      database: down
                      llm: ok
                    timestamp: "2026-07-18T12:00:00.000Z"
                    version: "3.2.0"
                    uptime: 12483
                    uptimeHuman: "12s"

  /api/chat:
    post:
      tags: [Chat]
      summary: Streaming chat with memory injection
      description: |
        Conversational chat endpoint. The server:
        1. Gets or creates a conversation row.
        2. Saves the user message.
        3. Recalls relevant memories (vector search or SQLite LIKE fallback).
        4. Streams the LLM response token-by-token as SSE.
        5. Saves the assistant message.
        6. Fire-and-forgets memory extraction for the next turn.

        Requires at least one LLM provider to be configured
        (`NVIDIA_API_KEY`, `OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, or
        `OLLAMA_URL`).
      operationId: postChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                conversationId:
                  type: string
                  format: uuid
                  description: Existing conversation to append to. If omitted a new conversation is created.
                message:
                  type: string
                  minLength: 1
                  description: The user's message. Sanitised for prompt-injection patterns before reaching the LLM.
      responses:
        "200":
          description: SSE stream of chat tokens.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Lines of `data: {json}\n\n`. Token events have shape
                  `{ "token": "..." }`; the terminal event has shape
                  `{ "done": true, "conversationId": "...", "tokensUsed": 123 }`;
                  errors are surfaced in-stream as `{ "error": "..." }`.
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/chat/agent:
    post:
      tags: [Chat]
      summary: ReAct chat with tool use
      description: |
        Like `/api/chat` but the assistant can call tools (`web_search`,
        `run_code`) in a 5-iteration ReAct loop. Optional `skill` selects a
        system-prompt + tool whitelist preset (default is `"default"`).
      operationId: postChatAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                conversationId:
                  type: string
                  format: uuid
                message:
                  type: string
                  minLength: 1
                skill:
                  type: string
                  default: default
      responses:
        "200":
          description: SSE stream with `token`, `tool_call`, `tool_result`, and `done` events.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/modes/quick:
    post:
      tags: [Modal]
      summary: Quick-mode single LLM call (no research pipeline)
      description: |
        One-shot streaming LLM response. No memory recall, no search, no
        history. Use this when the user wants a fast answer without a full
        research cycle. Accepts `message` or `query` for compatibility.
      operationId: postQuickMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 10000
                query:
                  type: string
                  maxLength: 10000
                  description: Alias for `message`.
      responses:
        "200":
          description: |
            SSE stream of `{ "token": "..." }` events followed by
            `{ "done": true, "tokensUsed": 123 }`.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/research/start:
    post:
      tags: [Research]
      summary: Start an async deep-research job
      description: |
        Validates the query, applies prompt-injection sanitisation, rate-limits
        per-IP, creates a job in the in-memory research store, then fires the
        `runResearch` pipeline in the background. Returns immediately with the
        job id — the client polls `/api/research/status/{id}` for progress.

        An optional pre-approved `plan` (from the Plan Preview step) can be
        supplied to skip plan generation.
      operationId: startResearch
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 100000
                depth:
                  type: string
                  enum: [standard, deep, advanced]
                numSubQueries:
                  type: integer
                  minimum: 2
                  maximum: 12
                maxLinksPerQuery:
                  type: integer
                  minimum: 3
                  maximum: 25
                reportMaxTokens:
                  type: integer
                  minimum: 1000
                  maximum: 32000
                plan:
                  $ref: "#/components/schemas/ResearchPlan"
      responses:
        "200":
          description: Job created and started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  status:
                    type: string
                  config:
                    type: object
                  retriever:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/research/status/{id}:
    get:
      tags: [Research]
      summary: Poll research job status
      description: |
        Returns the live status (phase, progress counters, current sub-query,
        etc.) of a research job. Use this for polling; for streaming progress
        use `/api/research/stream/{id}` instead.
      operationId: getResearchStatus
      security:
        - basicAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: Current job snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/ResearchJob"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/research/result/{id}:
    get:
      tags: [Research]
      summary: Get final research report + sources
      description: |
        Returns the final markdown report, sources list, and sub-queries for a
        completed job. If the job is still running, returns its current
        snapshot (same shape as `/api/research/status/{id}`).
      operationId: getResearchResult
      security:
        - basicAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: Final job result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/ResearchJob"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/research/stop/{id}:
    post:
      tags: [Research]
      summary: Cancel a running research job
      description: |
        Aborts a running research job. Two things happen:

          1. `job.abortController.abort("Cancelled by user")` — cancels
             all in-flight `fetch()` calls (search, page reads) immediately.
             They throw `AbortError` and the pipeline unwinds.
          2. `job.cancelled = true` — the pipeline checks this flag
             before each stage as a cooperative fallback in case a
             request already completed before the abort fired.

        The job is then persisted with `status: "failed"` and
        `error: "Cancelled by user"` so the cancellation survives
        server restarts. Audit-logged as `research.stop`.

        NOTE: the route is implemented as `POST` (not `DELETE`) because
        it has side effects beyond deletion (abort + persist) and the
        Next.js Route Handler exports `POST`. RESTful convention would
        use `DELETE`; the audit spec listed it that way — both refer to
        the same conceptual "cancel job" operation.
      operationId: stopResearch
      security:
        - basicAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: Job cancelled (or already finished).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  status:
                    type: string
                    enum: [failed]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/swarm:
    post:
      tags: [Swarm]
      summary: Multi-agent swarm (SSE)
      description: |
        Runs the three-stage swarm pipeline:
        1. Orchestrator breaks the task into 2–4 role-tagged subtasks.
        2. Workers run in parallel (each with role-specific prompt + tools).
        3. Synthesiser merges worker outputs into a single markdown report.

        All events are streamed as SSE. Closing the connection aborts the
        swarm.
      operationId: postSwarm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task:
                  type: string
                  maxLength: 2000
      responses:
        "200":
          description: SSE stream of swarm events (`swarm_start`, `agent_start`, `agent_token`, `agent_tool`, `agent_result`, `agent_done`, `synth_start`, `synth_token`, `swarm_done`, `error`).
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/vision:
    post:
      tags: [Media]
      summary: Analyse an image with a vision LLM
      description: |
        Sends a base64-encoded image to the configured vision provider
        (NVIDIA / OpenAI / Anthropic). Returns a text description of the
        image and optional structured fields.
      operationId: postVision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image, mimeType]
              properties:
                image:
                  type: string
                  format: byte
                  description: Base64-encoded image bytes (no `data:` prefix).
                mimeType:
                  type: string
                  examples:
                    - image/png
                    - image/jpeg
                    - image/webp
                prompt:
                  type: string
                  description: Optional question or instruction about the image.
      responses:
        "200":
          description: Vision analysis result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  description:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tts:
    post:
      tags: [Media]
      summary: Synthesize speech from text
      description: |
        Generates spoken audio for the given text. Returns either a base64
        audio payload (for client-side playback) or a URL, depending on the
        provider response shape.
      operationId: postTts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 4000
                voice:
                  type: string
                  description: Optional voice ID/name hint.
                speed:
                  type: number
                  format: float
                  minimum: 0.5
                  maximum: 2.0
      responses:
        "200":
          description: TTS result with audio payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  audio:
                    type: string
                    format: byte
                  format:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/files/generate:
    post:
      tags: [Files]
      summary: Generate an office document (PDF/DOCX/PPTX/XLSX/MD)
      description: |
        Renders the given `content` (markdown or plain text) into a binary
        office document and streams it back as a download. The `Content-Type`
        and `Content-Disposition` headers are set accordingly.
      operationId: postFileGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, title, content]
              properties:
                type:
                  type: string
                  enum: [pdf, docx, pptx, xlsx, md]
                title:
                  type: string
                  minLength: 1
                content:
                  type: string
                  maxLength: 500000
      responses:
        "200":
          description: Binary file download.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Type:
              schema:
                type: string
            Content-Disposition:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/sessions:
    get:
      tags: [Sessions]
      summary: List recent sessions
      description: |
        Returns the 50 most recently updated sessions from the persistent
        store, plus any in-progress research jobs that have not yet been
        persisted.
      operationId: listSessions
      responses:
        "200":
          description: Session list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
                  activeJobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActiveJob"
                  total:
                    type: integer
    delete:
      tags: [Sessions]
      summary: Delete all sessions
      operationId: deleteAllSessions
      responses:
        "200":
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: integer

  /api/eval:
    get:
      tags: [Eval]
      summary: List evaluation dataset (metadata only)
      description: |
        Returns the list of evaluation queries in the bundled dataset with
        their type, difficulty, and expected-source/keyword counts. Does not
        execute any LLM calls.
      operationId: getEvalDataset
      responses:
        "200":
          description: Dataset metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  queries:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
    post:
      tags: [Eval]
      summary: Run the evaluation suite
      description: |
        Runs the full evaluation suite (real research jobs + LLM scoring).
        Admin-only (HTTP Basic auth) and rate-limited to 1 run per 10 minutes
        per IP. Optional `queries` array selects a subset of the dataset by
        id; omit to run all.
      operationId: runEvalSuite
      security:
        - basicAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                queries:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Eval results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                  results:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/docs:
    get:
      tags: [Docs]
      summary: Serve this OpenAPI spec as YAML
      description: |
        Returns the raw `openapi.yaml` file with `Content-Type: application/yaml`.
        Point Swagger UI / Redoc at this URL to render interactive docs.
      operationId: getOpenApiSpec
      security: []
      responses:
        "200":
          description: OpenAPI 3.1 YAML document.
          content:
            application/yaml:
              schema:
                type: string

  /api/account:
    delete:
      tags: [Account]
      summary: GDPR Article 17 — right to erasure
      description: |
        Permanently deletes ALL data associated with the current user:
        conversations (+ messages via cascade), long_term_memories,
        research_jobs, documents, projects (+ connectors via cascade),
        subscriptions, usage_records, user_preferences, audit_logs
        (this user's), and artifact_storage (this user's).

        The legacy `sessions` table has no `user_id` column; in single-
        tenant mode (auth disabled, `userId === "default"`) it is
        wiped, otherwise it is left alone.

        This operation is **irreversible**. The front-end should show a
        confirmation modal before issuing this request. Audit-logged
        twice — at initiation (`phase: "initiated"`) and on completion
        (`phase: "completed"`) with per-table counts.
      operationId: deleteAccount
      security:
        - basicAuth: []
      responses:
        "200":
          description: Account deleted. Response contains per-table counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: object
                    properties:
                      sessions:
                        type: integer
                      memories:
                        type: integer
                      connectors:
                        type: integer
                      conversations:
                        type: integer
                      researchJobs:
                        type: integer
                      documents:
                        type: integer
                      projects:
                        type: integer
                      subscriptions:
                        type: integer
                      usageRecords:
                        type: integer
                      preferences:
                        type: integer
                      auditLogs:
                        type: integer
                      artifactStorage:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/account/export:
    get:
      tags: [Account]
      summary: GDPR Article 20 — right to data portability
      description: |
        Exports ALL data associated with the current user as a JSON
        download. Response has
        `Content-Disposition: attachment; filename="quaesitor-data-export.json"`.

        Includes: conversations (with messages), long_term_memories,
        research_jobs, documents (metadata + extracted text), projects
        (with connectors — credentials **decrypted** for portability),
        subscriptions, usage_records, user_preferences, audit_logs
        (this user's), and artifact_storage (this user's).

        Audit-logged at initiation and completion with per-table counts.
        Cache-Control: no-store.
      operationId: exportAccount
      security:
        - basicAuth: []
      responses:
        "200":
          description: JSON download with the user's full data.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="quaesitor-data-export.json"
            Cache-Control:
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/consent:
    get:
      tags: [Consent]
      summary: GDPR Art. 7 — read consent ledger
      description: |
        Returns the canonical consent state for the current user across
        the five regulated consent keys: `termsOfService`,
        `privacyPolicy`, `memoryExtraction`, `marketing`, and
        `ageConfirmation`.

        Every key is present in the response; missing rows default to
        `{ granted: false, timestamp: null, version: null }`. The
        ledger is the source of truth — the legacy
        `user_preferences.memory_consent` column is a denormalised
        cache that `POST /api/consent` keeps in sync.
      operationId: getConsent
      security:
        - basicAuth: []
      responses:
        "200":
          description: The user's full consent map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentLedger"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Consent]
      summary: GDPR Art. 7 — update a single consent key
      description: |
        Upserts a single consent key in the ledger with a fresh
        timestamp. Zod-validated against the canonical `CONSENT_KEYS`
        list. Audit-logged via the `consent.update` slug so consent is
        demonstrable per GDPR Art. 7(1).

        When `key === "memoryExtraction"`, the value is mirrored into
        the legacy `user_preferences.memory_consent` column so the
        existing `isMemoryExtractionEnabled()` gate (read by
        `/api/chat`, `/api/chat/agent`, `/api/memories/extract`)
        honors the consent ledger without a migration.

        The optional `version` field lets the UI re-prompt on a new
        policy version (defaults to `CURRENT_POLICY_VERSION = "1.0"`).
      operationId: updateConsent
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, granted]
              properties:
                key:
                  type: string
                  enum:
                    - termsOfService
                    - privacyPolicy
                    - memoryExtraction
                    - marketing
                    - ageConfirmation
                granted:
                  type: boolean
                version:
                  type: string
                  maxLength: 20
                  description: Policy version stamp. Defaults to `"1.0"`.
      responses:
        "200":
          description: Consent updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  consent:
                    $ref: "#/components/schemas/ConsentRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Begin MFA enrollment (TOTP)
      description: |
        Generates a fresh TOTP secret + 10 single-use backup codes,
        stores them in `user_mfa` as `enabled=0` (pending), and
        returns the secret, the `otpauth://` URI (for QR generation),
        and the **plaintext** backup codes.

        Backup codes are returned **exactly once**. They are stored as
        SHA-256 hashes; if the user loses them, they must disable and
        re-enroll MFA.

        The user then adds the secret to their authenticator app and
        submits a current 6-digit TOTP to `/api/auth/mfa/verify` to
        confirm possession and activate MFA.

        Refuses with `409` if MFA is already enabled — the user must
        explicitly disable it first to prevent silent secret rotation.
        Audit-logged as `auth.mfa_verify` with `phase: "setup_initiated"`.
      operationId: setupMfa
      security:
        - basicAuth: []
      responses:
        "200":
          description: Pending MFA setup created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  secret:
                    type: string
                    description: Base32 TOTP secret (manual entry).
                  uri:
                    type: string
                    description: "`otpauth://totp/...` URI for QR generation."
                  backupCodes:
                    type: array
                    items:
                      type: string
                    description: Ten 8-digit backup codes (returned once).
                  algorithm:
                    type: string
                    example: SHA1
                  digits:
                    type: integer
                    example: 6
                  period:
                    type: integer
                    example: 30
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: MFA is already enabled. Disable it first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Complete MFA enrollment (verify TOTP)
      description: |
        Verifies the supplied 6-digit TOTP against the PENDING secret
        stored by `/api/auth/mfa/setup`. On success, marks the MFA
        record as `enabled=1`. On failure, returns 400 without
        revealing whether the pending setup exists (to avoid leaking
        which userIds have begun enrollment).

        Audit-logged as `auth.mfa_enable` on success (the moment MFA
        actually becomes active for the account); failed attempts are
        logged as `auth.mfa_verify` with `phase: "verify_failed"` so
        brute-force patterns are detectable.
      operationId: verifyMfa
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  pattern: '^\d{6}$'
                  description: Exactly 6 digits.
      responses:
        "200":
          description: MFA enabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid token or no pending setup.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/mfa/disable:
    post:
      tags: [Auth]
      summary: Disable MFA
      description: |
        Revokes MFA for the current user. Requires the user to prove
        possession of either a current 6-digit TOTP **or** an 8-digit
        backup code before MFA is removed — this prevents an attacker
        who briefly obtains the session from silently weakening the
        account.

        On success, the `user_mfa` row is deleted entirely (secret +
        backup code hashes). Audit-logged as `auth.mfa_disable` with
        `method: "totp" | "backup_code"`.
      operationId: disableMfa
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  pattern: '^\d{6}$'
                  description: Current 6-digit TOTP.
                backupCode:
                  type: string
                  pattern: '^\d{8}$'
                  description: Optional 8-digit backup code (alternative to TOTP).
      responses:
        "200":
          description: MFA disabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid token / backup code, or MFA not enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/mcp/marketplace:
    get:
      tags: [MCP]
      summary: List available MCP servers
      description: |
        Returns the marketplace catalog with current install state.
        The client uses this to render the marketplace UI; install /
        uninstall state is reflected immediately because
        `getMarketplace()` reads the in-memory Set every call.

        Not admin-gated — the catalog is public information. The
        actual install / uninstall action IS auth-gated (see
        `/api/mcp/install`).

        The `stub: true` field surfaces that real MCP transport
        wiring is future work (see `docs/ROADMAP_v2.md`, Phase 2).
      operationId: getMcpMarketplace
      security: []
      responses:
        "200":
          description: Marketplace catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  servers:
                    type: array
                    items:
                      $ref: "#/components/schemas/McpServer"
                  stub:
                    type: boolean
                    description: True until real MCP transport is wired.
                  installedCount:
                    type: integer
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/mcp/install:
    post:
      tags: [MCP]
      summary: Install or uninstall an MCP server (stub)
      description: |
        Marks the named server as installed (or uninstalled) in the
        in-memory registry. Real MCP transport wiring is future work
        (see `docs/ROADMAP_v2.md`, Phase 2 — "MCP marketplace").
        Today this endpoint exists so the marketplace UI has a working
        install / uninstall button — state is preserved for the
        lifetime of the server process only.

        Auth: required (`requireAuth`). Anonymous callers cannot
        change install state. Audit-logged as `admin.access` with
        `{ route: "mcp.install", serverId, serverName, action, changed }`.
      operationId: installMcpServer
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, action]
              properties:
                id:
                  type: string
                  description: Server id from the marketplace catalog.
                action:
                  type: string
                  enum: [install, uninstall]
      responses:
        "200":
          description: Install / uninstall completed (or was a no-op).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  server:
                    $ref: "#/components/schemas/McpServer"
                  changed:
                    type: boolean
                    description: False if the server was already in the requested state.
                  stub:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/metrics:
    get:
      tags: [Metrics]
      summary: Admin-only platform KPI dashboard
      description: |
        Surfaces the KPIs an operator needs to understand system health
        at a glance:

          - Total users + active users (7d / 30d windows)
          - Total research jobs + success rate + avg duration
          - Total chat messages + total tokens consumed
          - Cache hit rate (from the research cache)
          - Carbon footprint for the current month
          - Plan distribution (free / pro / team / enterprise)

        Auth: requires `requireAuth` + `requireAdminAccess`. The admin
        IP allowlist (`ADMIN_IP_ALLOWLIST`) applies via
        `requireAdminAccess` if set. Audit-logged as `admin.access`
        with `{ route: "metrics" }`.
      operationId: getMetrics
      security:
        - basicAuth: []
      responses:
        "200":
          description: Platform KPI snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/feedback:
    post:
      tags: [Feedback]
      summary: Submit user feedback (thumbs up/down + free text)
      description: |
        Powers the floating FeedbackWidget at the bottom-left of
        every page. Stores a single feedback row in the lazily-created
        `feedback` SQLite table.

        Auth: required (`requireAuth`) — users must be signed in to
        leave feedback (anonymous feedback is rejected to prevent
        spam). Audit-logged as `admin.access` with
        `{ action: "feedback.submit", rating, hasComment }`.

        The optional `context` object captures the page / route /
        conversationId the feedback was given from to help triage.
      operationId: postFeedback
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: string
                  enum: [up, down]
                comment:
                  type: string
                  maxLength: 5000
                  description: Optional free-text feedback.
                context:
                  type: object
                  properties:
                    route:
                      type: string
                      maxLength: 500
                    conversationId:
                      type: string
                      maxLength: 200
                    messageId:
                      type: string
                      maxLength: 200
      responses:
        "200":
          description: Feedback stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    JobIdPath:
      name: id
      in: path
      required: true
      description: Research job id (returned by `POST /api/research/start`).
      schema:
        type: string

  responses:
    BadRequest:
      description: Malformed or invalid request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: HTTP Basic auth required or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: |
        Authenticated but not allowed — either the admin IP allowlist
        (`ADMIN_IP_ALLOWLIST`) rejected the request, or the user lacks
        the role required for the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Per-IP rate limit exceeded. Honours `Retry-After`.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic auth. Only enforced when both `AUTH_USERNAME` and
        `AUTH_PASSWORD` are set as environment variables. When unset, the
        endpoint is open.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        ok:
          type: boolean
          default: false
        error:
          type: string
        reason:
          type: string
          description: Optional structured reason (e.g. injection-detection reason).

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
          description: |
            Overall rollup. `"ok"` = every check passed (HTTP 200);
            `"degraded"` = at least one check is degraded, none down
            (HTTP 200); `"down"` = at least one check is down (HTTP 503).
        uptime:
          type: integer
          description: Process uptime in milliseconds (backward-compat field).
        uptimeHuman:
          type: string
          description: Human-readable uptime string (backward-compat field).
        version:
          type: string
          description: npm package version (`process.env.npm_package_version`).
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          description: |
            Per-subsystem status. Keys are present only when the
            subsystem is configured (e.g. `postgres` is absent in
            SQLite / in-memory dev mode).
          properties:
            database:
              type: string
              enum: [ok, degraded, down]
              description: Always present (SQLite or in-memory fallback).
            postgres:
              type: string
              enum: [ok, degraded, down]
              description: Only present when `DATABASE_URL` starts with `postgresql://`.
            llm:
              type: string
              enum: [ok, degraded, down]
              description: |
                `"ok"` if at least one of `NVIDIA_API_KEY`,
                `OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, or `OLLAMA_URL`
                is set; otherwise `"degraded"`.

    ResearchPlan:
      type: object
      required: [title, summary, sections]
      properties:
        title:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
        sections:
          type: array
          minItems: 1
          maxItems: 9
          items:
            type: object
            required: [id, title, description]
            properties:
              id:
                type: string
              title:
                type: string
                minLength: 1
              description:
                type: string

    ResearchJob:
      type: object
      properties:
        id:
          type: string
        query:
          type: string
        status:
          type: string
          enum: [pending, planning, searching, reading, writing, completed, failed, cancelled]
        startedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        phase:
          type: string
        plan:
          $ref: "#/components/schemas/ResearchPlan"
        subQueries:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: object
        report:
          type: string
          description: Final markdown report (empty until status is `completed`).
        stats:
          type: object
          properties:
            totalPagesRead:
              type: integer
            totalPagesSucceeded:
              type: integer
            roundsCompleted:
              type: integer
        error:
          type: string
          nullable: true

    Session:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        summary:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ActiveJob:
      type: object
      properties:
        id:
          type: string
        query:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        stats:
          type: object
          properties:
            totalPagesRead:
              type: integer
            totalPagesSucceeded:
              type: integer
            roundsCompleted:
              type: integer

    ConsentRecord:
      type: object
      properties:
        key:
          type: string
          enum:
            - termsOfService
            - privacyPolicy
            - memoryExtraction
            - marketing
            - ageConfirmation
        granted:
          type: boolean
        timestamp:
          type: string
          format: date-time
          nullable: true
          description: When the consent was last set (null if never set).
        version:
          type: string
          nullable: true
          description: Policy version stamp at the time of consent.

    ConsentLedger:
      type: object
      properties:
        ok:
          type: boolean
        userId:
          type: string
        consents:
          type: object
          properties:
            termsOfService:
              $ref: "#/components/schemas/ConsentRecord"
            privacyPolicy:
              $ref: "#/components/schemas/ConsentRecord"
            memoryExtraction:
              $ref: "#/components/schemas/ConsentRecord"
            marketing:
              $ref: "#/components/schemas/ConsentRecord"
            ageConfirmation:
              $ref: "#/components/schemas/ConsentRecord"

    AccountExport:
      type: object
      description: |
        GDPR Art. 20 data portability payload. All user-owned records
        are included; connector credentials are **decrypted** so the
        user can take them to another provider.
      properties:
        format:
          type: string
          example: quaesitor-account-export
        version:
          type: integer
          example: 1
        exportedAt:
          type: string
          format: date-time
        userId:
          type: string
        conversations:
          type: array
          items:
            type: object
        memories:
          type: array
          items:
            type: object
        researchJobs:
          type: array
          items:
            type: object
        documents:
          type: array
          items:
            type: object
        projects:
          type: array
          items:
            type: object
        subscriptions:
          type: array
          items:
            type: object
        usageRecords:
          type: array
          items:
            type: object
        preferences:
          type: object
          nullable: true
        auditLogs:
          type: array
          items:
            type: object
        artifactStorage:
          type: array
          items:
            type: object

    McpServer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        installed:
          type: boolean
          description: Whether this server is currently marked installed.
        homepage:
          type: string
          format: uri

    Metrics:
      type: object
      properties:
        ok:
          type: boolean
        generatedAt:
          type: string
          format: date-time
        users:
          type: object
          properties:
            total:
              type: integer
            active7d:
              type: integer
            active30d:
              type: integer
        research:
          type: object
          properties:
            totalJobs:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
            successRate:
              type: number
              description: 0..1 (rounded to 3 decimal places).
            avgDurationMs:
              type: integer
        chat:
          type: object
          properties:
            totalUserMessages:
              type: integer
            totalAssistantMessages:
              type: integer
            totalTokens:
              type: integer
        cache:
          type: object
          properties:
            hitRate:
              type: number
            size:
              type: integer
        carbon:
          type: object
          properties:
            gramsThisMonth:
              type: number
            local:
              type: boolean
            source:
              type: string
        planDistribution:
          type: object
          properties:
            free:
              type: integer
            pro:
              type: integer
            team:
              type: integer
            enterprise:
              type: integer
