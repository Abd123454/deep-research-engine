openapi: 3.1.0
info:
  title: Quaesitor API
  version: "4.0.0"
  description: |
    Quaesitor is a self-hostable research, chat, and multi-agent swarm platform
    with a dual-mode database (SQLite + Postgres), cross-provider LLM fallback
    (NVIDIA → OpenAI → Anthropic → Ollama), and a 5-layer memory system.

    Most POST endpoints that stream LLM output use Server-Sent Events
    (`text/event-stream`) with `data: {json}\n\n` framing.

    Authentication is optional and controlled by the `AUTH_USERNAME` and
    `AUTH_PASSWORD` environment variables. When both are set, protected
    endpoints require HTTP Basic auth. When unset, all endpoints are open.
    Rate limiting is applied per-IP via Redis when available, otherwise via
    an in-memory counter.
  contact:
    url: https://github.com/Abd123454/deep-research-engine

servers:
  - url: /
    description: Same-origin (default for the bundled Next.js app)

tags:
  - name: Health
    description: Service health & readiness probes
  - name: Chat
    description: Streaming chat with memory injection and ReAct tool use
  - name: Research
    description: Async deep-research pipeline (plan → search → read → write)
  - name: Swarm
    description: Multi-agent cluster (orchestrator + parallel workers + synth)
  - name: Modal
    description: Quick-mode single-shot LLM responses
  - name: Media
    description: Vision (image analysis), TTS, ASR
  - name: Files
    description: Office document generation
  - name: Sessions
    description: Persisted user sessions (history)
  - name: Eval
    description: Evaluation harness
  - name: Account
    description: GDPR Art. 17 (erasure) and Art. 20 (portability) endpoints
  - name: Consent
    description: GDPR Art. 7 consent ledger (read + update)
  - name: Auth
    description: Authentication — MFA enrollment, verification, and disable
  - name: Billing
    description: Stripe checkout, portal, subscription, and usage endpoints
  - name: APIKeys
    description: Long-lived bearer tokens for programmatic API access
  - name: DeviceControl
    description: Cross-platform device-control agent (Win/macOS/Linux)
  - name: Workspaces
    description: Multi-tenant workspaces with role-based membership
  - name: MCP
    description: Model Context Protocol server marketplace and install state
  - name: Metrics
    description: Admin-only platform KPI dashboard
  - name: Feedback
    description: User feedback (thumbs up/down + free text)
  - name: Docs
    description: This OpenAPI spec

paths:
  /api/health:
    get:
      tags: [Health]
      summary: Liveness & readiness probe
      description: |
        Returns the process uptime, the configured LLM provider, and the
        status of dependent subsystems (database, Postgres if configured,
        and at least one LLM provider). Used by the Docker HEALTHCHECK,
        the desktop wrapper's boot probe, and uptime monitors.

        The overall `status` is one of `"ok"`, `"degraded"`, or `"down"`:
          - `ok`        — every check passed (HTTP 200)
          - `degraded`  — at least one check is degraded, none down (HTTP 200)
          - `down`      — at least one check is down (HTTP 503)

        The `checks` map uses the same vocabulary per-subsystem. The
        `postgres` key is only present when `DATABASE_URL` points at
        Postgres (i.e. in production); in SQLite / in-memory dev mode
        the key is absent and the overall rollup ignores it.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is up (status is `ok` or `degraded`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                ok:
                  value:
                    status: ok
                    checks:
                      database: ok
                      llm: ok
                    timestamp: "2026-07-18T12:00:00.000Z"
                    version: "4.0.0"
                    uptime: 12483
                    uptimeHuman: "12s"
                degraded:
                  value:
                    status: degraded
                    checks:
                      database: ok
                      llm: degraded
                    timestamp: "2026-07-18T12:00:00.000Z"
                    version: "4.0.0"
                    uptime: 12483
                    uptimeHuman: "12s"
        "503":
          description: |
            Service is `down` — at least one critical subsystem (database)
            is unreachable. Retry with exponential backoff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                down:
                  value:
                    status: down
                    checks:
                      database: down
                      llm: ok
                    timestamp: "2026-07-18T12:00:00.000Z"
                    version: "4.0.0"
                    uptime: 12483
                    uptimeHuman: "12s"

  /api/chat:
    post:
      tags: [Chat]
      summary: Streaming chat with memory injection
      description: |
        Conversational chat endpoint. The server:
        1. Gets or creates a conversation row.
        2. Saves the user message.
        3. Recalls relevant memories (vector search or SQLite LIKE fallback).
        4. Streams the LLM response token-by-token as SSE.
        5. Saves the assistant message.
        6. Fire-and-forgets memory extraction for the next turn.

        Requires at least one LLM provider to be configured
        (`NVIDIA_API_KEY`, `OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, or
        `OLLAMA_URL`).
      operationId: postChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                conversationId:
                  type: string
                  format: uuid
                  description: Existing conversation to append to. If omitted a new conversation is created.
                message:
                  type: string
                  minLength: 1
                  description: The user's message. Sanitised for prompt-injection patterns before reaching the LLM.
      responses:
        "200":
          description: SSE stream of chat tokens.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Lines of `data: {json}\n\n`. Token events have shape
                  `{ "token": "..." }`; the terminal event has shape
                  `{ "done": true, "conversationId": "...", "tokensUsed": 123 }`;
                  errors are surfaced in-stream as `{ "error": "..." }`.
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/chat/agent:
    post:
      tags: [Chat]
      summary: ReAct chat with tool use
      description: |
        Like `/api/chat` but the assistant can call tools (`web_search`,
        `run_code`) in a 5-iteration ReAct loop. Optional `skill` selects a
        system-prompt + tool whitelist preset (default is `"default"`).
      operationId: postChatAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                conversationId:
                  type: string
                  format: uuid
                message:
                  type: string
                  minLength: 1
                skill:
                  type: string
                  default: default
      responses:
        "200":
          description: SSE stream with `token`, `tool_call`, `tool_result`, and `done` events.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/modes/quick:
    post:
      tags: [Modal]
      summary: Quick-mode single LLM call (no research pipeline)
      description: |
        One-shot streaming LLM response. No memory recall, no search, no
        history. Use this when the user wants a fast answer without a full
        research cycle. Accepts `message` or `query` for compatibility.
      operationId: postQuickMode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 10000
                query:
                  type: string
                  maxLength: 10000
                  description: Alias for `message`.
      responses:
        "200":
          description: |
            SSE stream of `{ "token": "..." }` events followed by
            `{ "done": true, "tokensUsed": 123 }`.
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/research/start:
    post:
      tags: [Research]
      summary: Start an async deep-research job
      description: |
        Validates the query, applies prompt-injection sanitisation, rate-limits
        per-IP, creates a job in the in-memory research store, then fires the
        `runResearch` pipeline in the background. Returns immediately with the
        job id — the client polls `/api/research/status/{id}` for progress.

        An optional pre-approved `plan` (from the Plan Preview step) can be
        supplied to skip plan generation.
      operationId: startResearch
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                  minLength: 1
                  maxLength: 100000
                depth:
                  type: string
                  enum: [standard, deep, advanced]
                numSubQueries:
                  type: integer
                  minimum: 2
                  maximum: 12
                maxLinksPerQuery:
                  type: integer
                  minimum: 3
                  maximum: 25
                reportMaxTokens:
                  type: integer
                  minimum: 1000
                  maximum: 32000
                plan:
                  $ref: "#/components/schemas/ResearchPlan"
      responses:
        "200":
          description: Job created and started.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  status:
                    type: string
                  config:
                    type: object
                  retriever:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/research/status/{id}:
    get:
      tags: [Research]
      summary: Poll research job status
      description: |
        Returns the live status (phase, progress counters, current sub-query,
        etc.) of a research job. Use this for polling; for streaming progress
        use `/api/research/stream/{id}` instead.
      operationId: getResearchStatus
      security:
        - basicAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: Current job snapshot.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/ResearchJob"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/research/result/{id}:
    get:
      tags: [Research]
      summary: Get final research report + sources
      description: |
        Returns the final markdown report, sources list, and sub-queries for a
        completed job. If the job is still running, returns its current
        snapshot (same shape as `/api/research/status/{id}`).
      operationId: getResearchResult
      security:
        - basicAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: Final job result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  job:
                    $ref: "#/components/schemas/ResearchJob"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/research/stop/{id}:
    post:
      tags: [Research]
      summary: Cancel a running research job
      description: |
        Aborts a running research job. Two things happen:

          1. `job.abortController.abort("Cancelled by user")` — cancels
             all in-flight `fetch()` calls (search, page reads) immediately.
             They throw `AbortError` and the pipeline unwinds.
          2. `job.cancelled = true` — the pipeline checks this flag
             before each stage as a cooperative fallback in case a
             request already completed before the abort fired.

        The job is then persisted with `status: "failed"` and
        `error: "Cancelled by user"` so the cancellation survives
        server restarts. Audit-logged as `research.stop`.

        NOTE: the route is implemented as `POST` (not `DELETE`) because
        it has side effects beyond deletion (abort + persist) and the
        Next.js Route Handler exports `POST`. RESTful convention would
        use `DELETE`; the audit spec listed it that way — both refer to
        the same conceptual "cancel job" operation.
      operationId: stopResearch
      security:
        - basicAuth: []
      parameters:
        - $ref: "#/components/parameters/JobIdPath"
      responses:
        "200":
          description: Job cancelled (or already finished).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  status:
                    type: string
                    enum: [failed]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/swarm:
    post:
      tags: [Swarm]
      summary: Multi-agent swarm (SSE)
      description: |
        Runs the three-stage swarm pipeline:
        1. Orchestrator breaks the task into 2–4 role-tagged subtasks.
        2. Workers run in parallel (each with role-specific prompt + tools).
        3. Synthesiser merges worker outputs into a single markdown report.

        All events are streamed as SSE. Closing the connection aborts the
        swarm.
      operationId: postSwarm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task:
                  type: string
                  maxLength: 2000
      responses:
        "200":
          description: SSE stream of swarm events (`swarm_start`, `agent_start`, `agent_token`, `agent_tool`, `agent_result`, `agent_done`, `synth_start`, `synth_token`, `swarm_done`, `error`).
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: No LLM provider configured.

  /api/vision:
    post:
      tags: [Media]
      summary: Analyse an image with a vision LLM
      description: |
        Sends a base64-encoded image to the configured vision provider
        (NVIDIA / OpenAI / Anthropic). Returns a text description of the
        image and optional structured fields.
      operationId: postVision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [image, mimeType]
              properties:
                image:
                  type: string
                  format: byte
                  description: Base64-encoded image bytes (no `data:` prefix).
                mimeType:
                  type: string
                  examples:
                    - image/png
                    - image/jpeg
                    - image/webp
                prompt:
                  type: string
                  description: Optional question or instruction about the image.
      responses:
        "200":
          description: Vision analysis result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  description:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/tts:
    post:
      tags: [Media]
      summary: Synthesize speech from text
      description: |
        Generates spoken audio for the given text. Returns either a base64
        audio payload (for client-side playback) or a URL, depending on the
        provider response shape.
      operationId: postTts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  maxLength: 4000
                voice:
                  type: string
                  description: Optional voice ID/name hint.
                speed:
                  type: number
                  format: float
                  minimum: 0.5
                  maximum: 2.0
      responses:
        "200":
          description: TTS result with audio payload.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  audio:
                    type: string
                    format: byte
                  format:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/files/generate:
    post:
      tags: [Files]
      summary: Generate an office document (PDF/DOCX/PPTX/XLSX/MD)
      description: |
        Renders the given `content` (markdown or plain text) into a binary
        office document and streams it back as a download. The `Content-Type`
        and `Content-Disposition` headers are set accordingly.
      operationId: postFileGenerate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, title, content]
              properties:
                type:
                  type: string
                  enum: [pdf, docx, pptx, xlsx, md]
                title:
                  type: string
                  minLength: 1
                content:
                  type: string
                  maxLength: 500000
      responses:
        "200":
          description: Binary file download.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          headers:
            Content-Type:
              schema:
                type: string
            Content-Disposition:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/sessions:
    get:
      tags: [Sessions]
      summary: List recent sessions
      description: |
        Returns the 50 most recently updated sessions from the persistent
        store, plus any in-progress research jobs that have not yet been
        persisted.
      operationId: listSessions
      responses:
        "200":
          description: Session list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Session"
                  activeJobs:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActiveJob"
                  total:
                    type: integer
    delete:
      tags: [Sessions]
      summary: Delete all sessions
      operationId: deleteAllSessions
      responses:
        "200":
          description: Deletion summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: integer

  /api/eval:
    get:
      tags: [Eval]
      summary: List evaluation dataset (metadata only)
      description: |
        Returns the list of evaluation queries in the bundled dataset with
        their type, difficulty, and expected-source/keyword counts. Does not
        execute any LLM calls.
      operationId: getEvalDataset
      responses:
        "200":
          description: Dataset metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  queries:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
    post:
      tags: [Eval]
      summary: Run the evaluation suite
      description: |
        Runs the full evaluation suite (real research jobs + LLM scoring).
        Admin-only (HTTP Basic auth) and rate-limited to 1 run per 10 minutes
        per IP. Optional `queries` array selects a subset of the dataset by
        id; omit to run all.
      operationId: runEvalSuite
      security:
        - basicAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                queries:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Eval results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                  results:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/docs:
    get:
      tags: [Docs]
      summary: Serve this OpenAPI spec as YAML
      description: |
        Returns the raw `openapi.yaml` file with `Content-Type: application/yaml`.
        Point Swagger UI / Redoc at this URL to render interactive docs.
      operationId: getOpenApiSpec
      security: []
      responses:
        "200":
          description: OpenAPI 3.1 YAML document.
          content:
            application/yaml:
              schema:
                type: string

  /api/account:
    delete:
      tags: [Account]
      summary: GDPR Article 17 — right to erasure
      description: |
        Permanently deletes ALL data associated with the current user:
        conversations (+ messages via cascade), long_term_memories,
        research_jobs, documents, projects (+ connectors via cascade),
        subscriptions, usage_records, user_preferences, audit_logs
        (this user's), and artifact_storage (this user's).

        The legacy `sessions` table has no `user_id` column; in single-
        tenant mode (auth disabled, `userId === "default"`) it is
        wiped, otherwise it is left alone.

        This operation is **irreversible**. The front-end should show a
        confirmation modal before issuing this request. Audit-logged
        twice — at initiation (`phase: "initiated"`) and on completion
        (`phase: "completed"`) with per-table counts.
      operationId: deleteAccount
      security:
        - basicAuth: []
      responses:
        "200":
          description: Account deleted. Response contains per-table counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  deleted:
                    type: object
                    properties:
                      sessions:
                        type: integer
                      memories:
                        type: integer
                      connectors:
                        type: integer
                      conversations:
                        type: integer
                      researchJobs:
                        type: integer
                      documents:
                        type: integer
                      projects:
                        type: integer
                      subscriptions:
                        type: integer
                      usageRecords:
                        type: integer
                      preferences:
                        type: integer
                      auditLogs:
                        type: integer
                      artifactStorage:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/account/export:
    get:
      tags: [Account]
      summary: GDPR Article 20 — right to data portability
      description: |
        Exports ALL data associated with the current user as a JSON
        download. Response has
        `Content-Disposition: attachment; filename="quaesitor-data-export.json"`.

        Includes: conversations (with messages), long_term_memories,
        research_jobs, documents (metadata + extracted text), projects
        (with connectors — credentials **decrypted** for portability),
        subscriptions, usage_records, user_preferences, audit_logs
        (this user's), and artifact_storage (this user's).

        Audit-logged at initiation and completion with per-table counts.
        Cache-Control: no-store.
      operationId: exportAccount
      security:
        - basicAuth: []
      responses:
        "200":
          description: JSON download with the user's full data.
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="quaesitor-data-export.json"
            Cache-Control:
              schema:
                type: string
                example: no-store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/consent:
    get:
      tags: [Consent]
      summary: GDPR Art. 7 — read consent ledger
      description: |
        Returns the canonical consent state for the current user across
        the five regulated consent keys: `termsOfService`,
        `privacyPolicy`, `memoryExtraction`, `marketing`, and
        `ageConfirmation`.

        Every key is present in the response; missing rows default to
        `{ granted: false, timestamp: null, version: null }`. The
        ledger is the source of truth — the legacy
        `user_preferences.memory_consent` column is a denormalised
        cache that `POST /api/consent` keeps in sync.
      operationId: getConsent
      security:
        - basicAuth: []
      responses:
        "200":
          description: The user's full consent map.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConsentLedger"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Consent]
      summary: GDPR Art. 7 — update a single consent key
      description: |
        Upserts a single consent key in the ledger with a fresh
        timestamp. Zod-validated against the canonical `CONSENT_KEYS`
        list. Audit-logged via the `consent.update` slug so consent is
        demonstrable per GDPR Art. 7(1).

        When `key === "memoryExtraction"`, the value is mirrored into
        the legacy `user_preferences.memory_consent` column so the
        existing `isMemoryExtractionEnabled()` gate (read by
        `/api/chat`, `/api/chat/agent`, `/api/memories/extract`)
        honors the consent ledger without a migration.

        The optional `version` field lets the UI re-prompt on a new
        policy version (defaults to `CURRENT_POLICY_VERSION = "1.0"`).
      operationId: updateConsent
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, granted]
              properties:
                key:
                  type: string
                  enum:
                    - termsOfService
                    - privacyPolicy
                    - memoryExtraction
                    - marketing
                    - ageConfirmation
                granted:
                  type: boolean
                version:
                  type: string
                  maxLength: 20
                  description: Policy version stamp. Defaults to `"1.0"`.
      responses:
        "200":
          description: Consent updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  consent:
                    $ref: "#/components/schemas/ConsentRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Begin MFA enrollment (TOTP)
      description: |
        Generates a fresh TOTP secret + 10 single-use backup codes,
        stores them in `user_mfa` as `enabled=0` (pending), and
        returns the secret, the `otpauth://` URI (for QR generation),
        and the **plaintext** backup codes.

        Backup codes are returned **exactly once**. They are stored as
        SHA-256 hashes; if the user loses them, they must disable and
        re-enroll MFA.

        The user then adds the secret to their authenticator app and
        submits a current 6-digit TOTP to `/api/auth/mfa/verify` to
        confirm possession and activate MFA.

        Refuses with `409` if MFA is already enabled — the user must
        explicitly disable it first to prevent silent secret rotation.
        Audit-logged as `auth.mfa_verify` with `phase: "setup_initiated"`.
      operationId: setupMfa
      security:
        - basicAuth: []
      responses:
        "200":
          description: Pending MFA setup created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  secret:
                    type: string
                    description: Base32 TOTP secret (manual entry).
                  uri:
                    type: string
                    description: "`otpauth://totp/...` URI for QR generation."
                  backupCodes:
                    type: array
                    items:
                      type: string
                    description: Ten 8-digit backup codes (returned once).
                  algorithm:
                    type: string
                    example: SHA1
                  digits:
                    type: integer
                    example: 6
                  period:
                    type: integer
                    example: 30
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: MFA is already enabled. Disable it first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Complete MFA enrollment (verify TOTP)
      description: |
        Verifies the supplied 6-digit TOTP against the PENDING secret
        stored by `/api/auth/mfa/setup`. On success, marks the MFA
        record as `enabled=1`. On failure, returns 400 without
        revealing whether the pending setup exists (to avoid leaking
        which userIds have begun enrollment).

        Audit-logged as `auth.mfa_enable` on success (the moment MFA
        actually becomes active for the account); failed attempts are
        logged as `auth.mfa_verify` with `phase: "verify_failed"` so
        brute-force patterns are detectable.
      operationId: verifyMfa
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  pattern: '^\d{6}$'
                  description: Exactly 6 digits.
      responses:
        "200":
          description: MFA enabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid token or no pending setup.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/mfa/disable:
    post:
      tags: [Auth]
      summary: Disable MFA
      description: |
        Revokes MFA for the current user. Requires the user to prove
        possession of either a current 6-digit TOTP **or** an 8-digit
        backup code before MFA is removed — this prevents an attacker
        who briefly obtains the session from silently weakening the
        account.

        On success, the `user_mfa` row is deleted entirely (secret +
        backup code hashes). Audit-logged as `auth.mfa_disable` with
        `method: "totp" | "backup_code"`.
      operationId: disableMfa
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  pattern: '^\d{6}$'
                  description: Current 6-digit TOTP.
                backupCode:
                  type: string
                  pattern: '^\d{8}$'
                  description: Optional 8-digit backup code (alternative to TOTP).
      responses:
        "200":
          description: MFA disabled.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid token / backup code, or MFA not enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/mcp/marketplace:
    get:
      tags: [MCP]
      summary: List available MCP servers
      description: |
        Returns the marketplace catalog with current install state.
        The client uses this to render the marketplace UI; install /
        uninstall state is reflected immediately because
        `getMarketplace()` reads the in-memory Set every call.

        Not admin-gated — the catalog is public information. The
        actual install / uninstall action IS auth-gated (see
        `/api/mcp/install`).

        The `stub: true` field surfaces that real MCP transport
        wiring is future work (see `docs/ROADMAP_v2.md`, Phase 2).
      operationId: getMcpMarketplace
      security: []
      responses:
        "200":
          description: Marketplace catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  servers:
                    type: array
                    items:
                      $ref: "#/components/schemas/McpServer"
                  stub:
                    type: boolean
                    description: True until real MCP transport is wired.
                  installedCount:
                    type: integer
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/mcp/install:
    post:
      tags: [MCP]
      summary: Install or uninstall an MCP server (stub)
      description: |
        Marks the named server as installed (or uninstalled) in the
        in-memory registry. Real MCP transport wiring is future work
        (see `docs/ROADMAP_v2.md`, Phase 2 — "MCP marketplace").
        Today this endpoint exists so the marketplace UI has a working
        install / uninstall button — state is preserved for the
        lifetime of the server process only.

        Auth: required (`requireAuth`). Anonymous callers cannot
        change install state. Audit-logged as `admin.access` with
        `{ route: "mcp.install", serverId, serverName, action, changed }`.
      operationId: installMcpServer
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, action]
              properties:
                id:
                  type: string
                  description: Server id from the marketplace catalog.
                action:
                  type: string
                  enum: [install, uninstall]
      responses:
        "200":
          description: Install / uninstall completed (or was a no-op).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  server:
                    $ref: "#/components/schemas/McpServer"
                  changed:
                    type: boolean
                    description: False if the server was already in the requested state.
                  stub:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/metrics:
    get:
      tags: [Metrics]
      summary: Admin-only platform KPI dashboard
      description: |
        Surfaces the KPIs an operator needs to understand system health
        at a glance:

          - Total users + active users (7d / 30d windows)
          - Total research jobs + success rate + avg duration
          - Total chat messages + total tokens consumed
          - Cache hit rate (from the research cache)
          - Carbon footprint for the current month
          - Plan distribution (free / pro / team / enterprise)

        Auth: requires `requireAuth` + `requireAdminAccess`. The admin
        IP allowlist (`ADMIN_IP_ALLOWLIST`) applies via
        `requireAdminAccess` if set. Audit-logged as `admin.access`
        with `{ route: "metrics" }`.
      operationId: getMetrics
      security:
        - basicAuth: []
      responses:
        "200":
          description: Platform KPI snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Metrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/feedback:
    post:
      tags: [Feedback]
      summary: Submit user feedback (thumbs up/down + free text)
      description: |
        Powers the floating FeedbackWidget at the bottom-left of
        every page. Stores a single feedback row in the lazily-created
        `feedback` SQLite table.

        Auth: required (`requireAuth`) — users must be signed in to
        leave feedback (anonymous feedback is rejected to prevent
        spam). Audit-logged as `admin.access` with
        `{ action: "feedback.submit", rating, hasComment }`.

        The optional `context` object captures the page / route /
        conversationId the feedback was given from to help triage.
      operationId: postFeedback
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating:
                  type: string
                  enum: [up, down]
                comment:
                  type: string
                  maxLength: 5000
                  description: Optional free-text feedback.
                context:
                  type: object
                  properties:
                    route:
                      type: string
                      maxLength: 500
                    conversationId:
                      type: string
                      maxLength: 200
                    messageId:
                      type: string
                      maxLength: 200
      responses:
        "200":
          description: Feedback stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                    format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account (COPPA/GDPR Art. 8 age gate)
      description: |
        Creates a new user with email + password (bcrypt-hashed). Enforces
        an age gate: requires either `dateOfBirth` (YYYY-MM-DD) or
        `ageConfirmed=true`. Users under 13 are refused with HTTP 403
        (COPPA / GDPR Art. 8). On success, sends a verification email
        (when `RESEND_API_KEY` is set) and audit-logs the registration.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                  maxLength: 200
                dateOfBirth:
                  type: string
                  format: date
                  description: YYYY-MM-DD. Used to compute age for the COPPA gate.
                ageConfirmed:
                  type: boolean
                  description: Alternative to dateOfBirth — caller asserts 13+.
      responses:
        "201":
          description: Account created. Verification email queued (if Resend configured).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  userId: { type: string, format: uuid }
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Underage (COPPA / GDPR Art. 8 refusal).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request a password-reset email
      description: |
        Always returns HTTP 200 (even for unknown emails) to prevent
        user-enumeration via timing or response-code differences. When
        the email matches a real account, a single-use reset token is
        written to the `verification_tokens` table (15-min TTL) and a
        reset-link email is queued (if `RESEND_API_KEY` is set). The
        token is consumed on first use at `/api/auth/reset-password`.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200":
          description: Reset email queued (or silently no-op'd for unknown emails).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, default: true }
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/billing/checkout:
    post:
      tags: [Billing]
      summary: Create a Stripe Checkout Session
      description: |
        Creates a Stripe Checkout Session for the given `priceId` (or
        `plan` lookup key). Sets `client_reference_id` to the
        authenticated user's id so the webhook can attribute the
        subscription. Returns a `url` the client should redirect to.
        Requires auth (`requireAuth`). Audit-logged as
        `billing.checkout.start`.
      operationId: createCheckoutSession
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                priceId: { type: string, description: Stripe price id (sk_...). }
                plan:
                  type: string
                  enum: [free, pro, team, enterprise]
                  description: Alternative to priceId — resolved via lookup_key.
                successUrl: { type: string, format: uri }
                cancelUrl: { type: string, format: uri }
      responses:
        "200":
          description: Checkout session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  url: { type: string, format: uri, description: Redirect the browser here. }
                  sessionId: { type: string, description: Stripe checkout session id. }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Plan limit reached (existing subscription blocks the new one).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/billing/portal:
    post:
      tags: [Billing]
      summary: Open the Stripe customer portal
      description: |
        Creates a Stripe Billing Portal session for the authenticated
        user's customer record (matched by email). Returns a `url` the
        client redirects to. Used for the "Manage subscription" /
        "Update card" / "Cancel" flows — Stripe handles the UI.
      operationId: createPortalSession
      security:
        - basicAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                returnUrl: { type: string, format: uri, description: Where Stripe redirects after the portal. }
      responses:
        "200":
          description: Portal session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  url: { type: string, format: uri }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: No Stripe customer record exists for this user yet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/billing/subscription:
    get:
      tags: [Billing]
      summary: Read the current user's subscription state
      description: |
        Returns the cached subscription row for the authenticated user
        — `plan`, `status`, `currentPeriodEnd`, `cancelAtPeriodEnd`,
        and metered-usage counters (queries this period, etc.). The row
        is kept in sync by the Stripe webhook
        (`/api/billing/webhook`). When no subscription exists, returns
        `{ plan: "free", status: "none" }`.
      operationId: getSubscription
      security:
        - basicAuth: []
      responses:
        "200":
          description: Subscription state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/billing/usage:
    get:
      tags: [Billing]
      summary: Read metered-usage counters for the current billing period
      description: |
        Returns the authenticated user's usage for the current billing
        period — research jobs, chat messages, tokens consumed, file
        generations, etc. Used by the dashboard usage widget and the
        plan-limit gate (`checkLimit`). Counts reset at
        `currentPeriodEnd`.
      operationId: getBillingUsage
      security:
        - basicAuth: []
      responses:
        "200":
          description: Usage counters.
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan: { type: string, enum: [free, pro, team, enterprise] }
                  periodStart: { type: string, format: date-time }
                  periodEnd: { type: string, format: date-time }
                  usage:
                    type: object
                    properties:
                      researchJobs: { type: integer }
                      chatMessages: { type: integer }
                      tokens: { type: integer }
                      fileGenerations: { type: integer }
                  limits:
                    type: object
                    description: Plan-specific caps for each usage key (null = unlimited).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/chat:
    post:
      tags: [Chat]
      summary: Public API chat (bearer-token auth)
      description: |
        Programmatic chat endpoint for the public API. Authenticates via
        a long-lived API key (`Authorization: Bearer qsk_...`) issued at
        `/api/keys`, NOT via the Basic-Auth session used by the web UI.
        Returns the same SSE token stream as `/api/chat`. Subject to
        per-key rate limits (stricter than the web UI). The API key's
        `scopes` field must include `chat:write`.
      operationId: postPublicChat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string, minLength: 1 }
                conversationId: { type: string, format: uuid }
                stream:
                  type: boolean
                  default: true
                  description: If false, returns the full response as JSON instead of SSE.
      responses:
        "200":
          description: SSE stream (default) or full JSON response (when `stream=false`).
          content:
            text/event-stream:
              schema:
                type: string
                description: Same framing as `/api/chat`.
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  reply: { type: string }
                  conversationId: { type: string, format: uuid }
                  tokensUsed: { type: integer }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: API key lacks the `chat:write` scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/keys:
    get:
      tags: [APIKeys]
      summary: List the current user's API keys
      description: |
        Returns the metadata for every API key owned by the
        authenticated user. The key secret itself is NEVER returned
        (only the bcrypt-hashed version is stored; the plaintext is
        shown once at creation time). Use the `lastUsedAt` field to
        detect stale keys for rotation.
      operationId: listApiKeys
      security:
        - basicAuth: []
      responses:
        "200":
          description: API key list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  keys:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [APIKeys]
      summary: Create a new API key
      description: |
        Mints a new long-lived bearer token (`qsk_...`). The plaintext
        key is returned EXACTLY ONCE in the response — store it
        securely; only the bcrypt hash is persisted. Optional `scopes`
        restrict what the key can do (e.g. `chat:write`,
        `research:write`, `read`). Optional `expiresAt` sets an
        expiry. Audit-logged as `apikey.create`.
      operationId: createApiKey
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                  description: Human label for the key.
                scopes:
                  type: array
                  items: { type: string }
                  description: Scope strings (e.g. `chat:write`, `research:write`, `read`).
                expiresAt:
                  type: string
                  format: date-time
                  description: Optional expiry. Omit for a non-expiring key.
      responses:
        "201":
          description: Key created. The plaintext `key` is shown only here.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  key: { type: string, description: "The plaintext key (qsk_...). Store it — it will not be shown again." }
                  id: { type: string, format: uuid }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/device-control:
    post:
      tags: [DeviceControl]
      summary: Execute a device-control action (Win/macOS/Linux)
      description: |
        Drives the cross-platform device-control agent — file system
        ops, process management, app launch, clipboard, screenshots,
        etc. Heavily restricted: requires auth + the `device:write`
        scope (admin role by default), AND a per-request confirmation
        token for destructive actions (file delete, process kill). All
        actions are audit-logged as `device.control.execute` with the
        command, target, and outcome.
      operationId: executeDeviceControl
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, target]
              properties:
                action:
                  type: string
                  enum: [file.read, file.write, file.delete, process.list, process.kill, app.launch, clipboard.read, clipboard.write, screenshot]
                target:
                  type: string
                  description: Path / process name / app id — depends on `action`.
                args:
                  type: object
                  description: Action-specific arguments (e.g. file contents for `file.write`).
                confirmToken:
                  type: string
                  description: Required for destructive actions (file.delete, process.kill). Obtained via a separate confirmation flow.
      responses:
        "200":
          description: Action executed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  result: { type: object, description: Action-specific result payload. }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Missing `device:write` scope or destructive action without `confirmToken`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces the current user belongs to
      description: |
        Returns the workspaces the authenticated user is a member of,
        with their role (`owner` / `admin` / `editor` / `viewer`) and
        membership metadata. Used by the workspace switcher in the
        sidebar.
      operationId: listWorkspaces
      security:
        - basicAuth: []
      responses:
        "200":
          description: Workspace membership list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  workspaces:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceMembership"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Workspaces]
      summary: Create a new workspace
      description: |
        Creates a new workspace and adds the authenticated user as the
        `owner` (the only role that can transfer ownership or delete the
        workspace). Audit-logged as `workspace.create`.
      operationId: createWorkspace
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 100 }
                slug: { type: string, maxLength: 60, description: URL-safe slug. Auto-generated from name if omitted. }
      responses:
        "201":
          description: Workspace created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  workspace: { $ref: "#/components/schemas/Workspace" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Slug already taken.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/verify:
    post:
      tags: [Auth]
      summary: Verify an email address with a single-use token
      description: |
        Consumes the `email_verification` token issued at registration
        (see `POST /api/auth/register`). The token is single-use — the
        `verification_tokens` row is marked `used_at = NOW()` on first
        successful verification; subsequent calls with the same token
        return 410 Gone. Sets `users.email_verified = true` on success.
        Always returns 200 for a well-formed request body, even if the
        token is invalid, to prevent user-enumeration via response codes.
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: The verification token from the email link.
      responses:
        "200":
          description: |
            Verification processed. `verified: true` if the token was
            valid + unused, `verified: false` if the token was invalid
            or already consumed (response code is still 200 to prevent
            enumeration).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  verified: { type: boolean }
        "400":
          $ref: "#/components/responses/BadRequest"
        "410":
          description: Token already consumed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with a single-use token
      description: |
        Consumes the `password_reset` token issued by
        `POST /api/auth/forgot-password`. Single-use — the token is
        marked consumed on first successful reset. The new password is
        bcrypt-hashed and persisted; all existing JWTs for this user
        are invalidated (the user must re-authenticate). 15-min TTL
        on the token.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                  description: The reset token from the email link.
                password:
                  type: string
                  minLength: 8
                  description: The new password.
      responses:
        "200":
          description: Password reset. User can now log in with the new password.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          $ref: "#/components/responses/BadRequest"
        "410":
          description: Token already consumed or expired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/keys/{id}:
    delete:
      tags: [APIKeys]
      summary: Revoke an API key
      description: |
        Marks the API key as revoked (soft-delete — the row is retained
        for audit). The key's bcrypt hash is set to `null` so any
        future request presenting the key is rejected with 401.
        Requires auth — only the key's owner can revoke their own keys.
        Audit-logged as `apikey.revoke`.
      operationId: revokeApiKey
      security:
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The API key id (UUID) to revoke.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Key revoked. No response body.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Attempt to revoke a key owned by another user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/workspaces/{id}/members:
    get:
      tags: [Workspaces]
      summary: List workspace members
      description: |
        Returns the membership roster of a workspace — userId, role
        (`owner` / `admin` / `editor` / `viewer`), and joinedAt. The
        caller must be a member of the workspace; otherwise 403.
      operationId: listWorkspaceMembers
      security:
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Workspace id (UUID).
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace member list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkspaceMembership"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is not a member of this workspace.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Workspaces]
      summary: Invite a user to a workspace
      description: |
        Adds a user to the workspace with the given role. Only
        `owner` / `admin` can invite; `editor` and `viewer` get 403.
        The invited user must already have an account (matched by
        email). Audit-logged as `workspace.member.add`.
      operationId: addWorkspaceMember
      security:
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Workspace id (UUID).
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                  description: The invitee's email — must match an existing account.
                role:
                  type: string
                  enum: [admin, editor, viewer]
                  description: Role to assign. `owner` cannot be assigned here (transfer is a separate flow).
      responses:
        "201":
          description: Member added.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  membership: { $ref: "#/components/schemas/WorkspaceMembership" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks `owner`/`admin` role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Invitee email does not match any account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User is already a member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags: [Workspaces]
      summary: Remove a user from a workspace
      description: |
        Removes a member from the workspace. The caller must be the
        workspace `owner` or be removing themselves (self-leave).
        Owners cannot be removed (transfer ownership first).
        Audit-logged as `workspace.member.remove`.
      operationId: removeWorkspaceMember
      security:
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Workspace id (UUID).
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          required: true
          description: The userId of the member to remove.
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Member removed. No response body.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks `owner` role and is not removing themselves, or attempting to remove the owner.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot remove the workspace owner — transfer ownership first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/mcp/connect:
    post:
      tags: [MCP]
      summary: Connect an MCP server
      description: |
        Establishes a connection to an MCP (Model Context Protocol)
        server — either stdio (local subprocess) or SSE (remote HTTP).
        The connection is registered with the orchestrator so the
        swarm / chat agents can call its tools. Requires auth; the
        connection is scoped to the caller's userId. Audit-logged as
        `mcp.connect`.
      operationId: connectMcpServer
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transport, serverId]
              properties:
                transport:
                  type: string
                  enum: [stdio, sse]
                  description: MCP transport — `stdio` for local, `sse` for remote.
                serverId:
                  type: string
                  description: MCP server id from the marketplace (e.g. `arxiv`, `pubmed`).
                command:
                  type: string
                  description: Required for `stdio` — the executable to launch (e.g. `npx`).
                args:
                  type: array
                  items: { type: string }
                  description: Required for `stdio` — argv for the subprocess.
                url:
                  type: string
                  format: uri
                  description: Required for `sse` — the remote MCP endpoint URL.
                env:
                  type: object
                  description: Optional env vars for the subprocess (stdio) or headers (sse).
      responses:
        "200":
          description: Connection established.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  connectionId: { type: string, format: uuid }
                  tools:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        description: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Server not in marketplace (or install not permitted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/mcp/disconnect:
    post:
      tags: [MCP]
      summary: Disconnect an MCP server
      description: |
        Tears down a previously-established MCP connection. For stdio
        transports, the subprocess is SIGTERM'd (then SIGKILL'd after
        5s if it doesn't exit). Tools from the disconnected server
        are removed from the orchestrator's tool registry. Idempotent
        — disconnecting an already-disconnected server returns 200.
        Audit-logged as `mcp.disconnect`.
      operationId: disconnectMcpServer
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [connectionId]
              properties:
                connectionId:
                  type: string
                  format: uuid
                  description: The connection id returned by `POST /api/mcp/connect`.
      responses:
        "200":
          description: Disconnected (or was already disconnected).
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Connection belongs to another user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/billing/webhook:
    post:
      tags: [Billing]
      summary: Stripe webhook receiver
      description: |
        Receives Stripe webhook events (checkout.session.completed,
        customer.subscription.updated, customer.subscription.deleted,
        invoice.payment_failed). Verifies the Stripe-Signature header
        against `STRIPE_WEBHOOK_SECRET`. Updates the user's
        subscription cache + plan-limit gate. Idempotent — events
        are deduplicated by Stripe event id.
      operationId: stripeWebhook
      security: []
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          description: Stripe webhook signature (verifies the body).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: The raw Stripe event payload.
      responses:
        "200":
          description: Event processed (or duplicate, which is a no-op).
          content:
            application/json:
              schema:
                type: object
                properties:
                  received: { type: boolean }
        "400":
          description: Invalid signature or unparseable body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/chat/conversations:
    get:
      tags: [Chat]
      summary: List chat conversations
      description: |
        Returns the authenticated user's chat conversations, most
        recent first. Paginated — `cursor` is a conversation id
        (returned in the last page's `nextCursor` field); pass it as
        `?cursor=...` to fetch the next page.
      operationId: listConversations
      security:
        - basicAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          description: Pagination cursor (conversation id).
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Conversation list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  conversations:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        title: { type: string }
                        lastMessageAt: { type: string, format: date-time }
                        messageCount: { type: integer }
                  nextCursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Chat]
      summary: Create a new chat conversation
      description: |
        Creates a new conversation with an optional title. The first
        user message is sent separately via `POST /api/chat` with the
        `conversationId` returned here.
      operationId: createConversation
      security:
        - basicAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 200
                  description: Optional. Auto-generated from the first message if omitted.
      responses:
        "201":
          description: Conversation created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  conversationId: { type: string, format: uuid }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/memories:
    get:
      tags: [Memory]
      summary: List the user's memories
      description: |
        Returns the user's long-term memories (layer 2 of the 5-layer
        memory system). Paginated by `cursor` (memory id). Filterable
        by `kind` (preference / fact / event / relationship / skill).
      operationId: listMemories
      security:
        - basicAuth: []
      parameters:
        - name: kind
          in: query
          required: false
          schema:
            type: string
            enum: [preference, fact, event, relationship, skill]
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Memory list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  memories:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
                  nextCursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Memory]
      summary: Create a memory
      description: |
        Manually add a long-term memory. (Most memories are created
        automatically by the memory extractor from chat messages —
        this endpoint is for explicit user additions like "remember
        that I prefer dark mode.") Requires consent — if the user has
        not consented to long-term memory storage, returns 403.
      operationId: createMemory
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, kind]
              properties:
                content:
                  type: string
                  maxLength: 2000
                kind:
                  type: string
                  enum: [preference, fact, event, relationship, skill]
                source:
                  type: string
                  description: Optional. Defaults to `manual`.
      responses:
        "201":
          description: Memory created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  memory: { $ref: "#/components/schemas/Memory" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: User has not consented to long-term memory storage (GDPR Art. 7).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/memories/{id}:
    delete:
      tags: [Memory]
      summary: Delete a memory
      description: |
        Soft-deletes a memory (sets `deletedAt`). The memory is no
        longer returned by `GET /api/memories` or used by the recall
        pipeline. Only the memory's owner can delete it.
      operationId: deleteMemory
      security:
        - basicAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Memory id (UUID).
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Memory deleted. No response body.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Memory belongs to another user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/audit-logs:
    get:
      tags: [Audit]
      summary: List audit log entries (admin only)
      description: |
        Returns the audit log — every security-sensitive action
        (auth, billing, device-control, MFA, key management, etc.)
        is recorded here. Admin-only: requires the `audit:read`
        scope or the `ADMIN_IP_ALLOWLIST` env var to match the
        caller's IP. Paginated by `cursor`.
      operationId: listAuditLogs
      security:
        - basicAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          description: Filter to a specific user's actions.
          schema:
            type: string
        - name: action
          in: query
          required: false
          description: Filter to a specific action (e.g. `apikey.create`).
          schema:
            type: string
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        "200":
          description: Audit log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  logs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  nextCursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller lacks `audit:read` scope or admin IP allowlist rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/asr:
    post:
      tags: [Media]
      summary: Speech-to-text (ASR)
      description: |
        Transcribes an audio file (mp3, wav, m4a, webm) using NVIDIA
        Riva (primary) or Whisper (fallback). The audio is sent as
        multipart form data. Returns the full transcript + segment
        timestamps. Files larger than `MAX_DOCUMENT_SIZE_MB` are
        rejected with 413.
      operationId: transcribeAudio
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                language:
                  type: string
                  description: Optional. BCP-47 language code (e.g. `en`, `ar`).
      responses:
        "200":
          description: Transcription complete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  text: { type: string }
                  segments:
                    type: array
                    items:
                      type: object
                      properties:
                        start: { type: number }
                        end: { type: number }
                        text: { type: string }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: File too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/video/analyze:
    post:
      tags: [Media]
      summary: Analyze a video (keyframes + transcript)
      description: |
        Extracts keyframes + transcribes the audio track from a video
        file. Requires `VIDEO_UNDERSTANDING_ENABLED=true` AND ffmpeg +
        Whisper installed on the host. Returns a 503 if either is
        missing — callers should check `isVideoUnderstandingAvailable`
        client-side and show a clean message instead of relying on
        the 503.
      operationId: analyzeVideo
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                keyframeInterval:
                  type: integer
                  default: 5
                  description: Extract one keyframe every N seconds.
                maxKeyframes:
                  type: integer
                  default: 20
                  description: Hard cap on keyframes.
                transcribe:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Analysis complete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  analysis: { $ref: "#/components/schemas/VideoAnalysis" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: File too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          description: Video understanding not available (no ffmpeg / Whisper).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/preferences:
    get:
      tags: [Preferences]
      summary: Get the user's preferences
      description: |
        Returns the user's UI + behaviour preferences (theme, language,
        default search depth, etc.). Falls back to defaults if the
        user has never set any.
      operationId: getPreferences
      security:
        - basicAuth: []
      responses:
        "200":
          description: User preferences.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  preferences:
                    type: object
                    additionalProperties: true
                    description: Arbitrary key-value preference map.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      tags: [Preferences]
      summary: Update the user's preferences
      description: |
        Replaces the user's preferences with the provided object.
        Existing keys not in the request body are removed (full
        replace, not merge). For partial updates, use the per-key
        endpoints (e.g. `PUT /api/preferences/memory`).
      operationId: updatePreferences
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: The full preference map to persist.
      responses:
        "200":
          description: Preferences updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/documents:
    get:
      tags: [Documents]
      summary: List the user's uploaded documents
      description: |
        Returns metadata for documents the user has uploaded (PDF,
        DOCX, TXT, MD). Does NOT return the document contents — use
        `GET /api/documents/{id}` for that. Paginated by `cursor`.
      operationId: listDocuments
      security:
        - basicAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        "200":
          description: Document list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Document"
                  nextCursor:
                    type: string
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Documents]
      summary: Upload a document
      description: |
        Uploads a document for use as research context / chat
        attachment. Multipart form data. Files larger than
        `MAX_DOCUMENT_SIZE_MB` (default 50MB) are rejected with 413.
        The file is virus-scanned (clamav if available) and the
        MIME type is verified against the extension.
      operationId: uploadDocument
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                title:
                  type: string
                  maxLength: 200
                  description: Optional. Defaults to the filename.
      responses:
        "201":
          description: Document uploaded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  document: { $ref: "#/components/schemas/Document" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: File too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: Unsupported media type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    JobIdPath:
      name: id
      in: path
      required: true
      description: Research job id (returned by `POST /api/research/start`).
      schema:
        type: string

  responses:
    BadRequest:
      description: Malformed or invalid request body.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: HTTP Basic auth required or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: |
        Authenticated but not allowed — either the admin IP allowlist
        (`ADMIN_IP_ALLOWLIST`) rejected the request, or the user lacks
        the role required for the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Per-IP rate limit exceeded. Honours `Retry-After`.
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
        HTTP Basic auth. Only enforced when both `AUTH_USERNAME` and
        `AUTH_PASSWORD` are set as environment variables. When unset, the
        endpoint is open.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: qsk
      description: |
        Long-lived API key (`qsk_...`) issued at `POST /api/keys`. Sent
        as `Authorization: Bearer qsk_...`. Used by the public API
        (`/api/v1/*`) and programmatic clients. Scopes are checked
        per-route (e.g. `chat:write`, `research:write`).

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        ok:
          type: boolean
          default: false
        error:
          type: string
        reason:
          type: string
          description: Optional structured reason (e.g. injection-detection reason).

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
          description: |
            Overall rollup. `"ok"` = every check passed (HTTP 200);
            `"degraded"` = at least one check is degraded, none down
            (HTTP 200); `"down"` = at least one check is down (HTTP 503).
        uptime:
          type: integer
          description: Process uptime in milliseconds (backward-compat field).
        uptimeHuman:
          type: string
          description: Human-readable uptime string (backward-compat field).
        version:
          type: string
          description: npm package version (`process.env.npm_package_version`).
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          description: |
            Per-subsystem status. Keys are present only when the
            subsystem is configured (e.g. `postgres` is absent in
            SQLite / in-memory dev mode).
          properties:
            database:
              type: string
              enum: [ok, degraded, down]
              description: Always present (SQLite or in-memory fallback).
            postgres:
              type: string
              enum: [ok, degraded, down]
              description: Only present when `DATABASE_URL` starts with `postgresql://`.
            llm:
              type: string
              enum: [ok, degraded, down]
              description: |
                `"ok"` if at least one of `NVIDIA_API_KEY`,
                `OPENAI_API_KEY`, `ANTHROPIC_API_KEY`, or `OLLAMA_URL`
                is set; otherwise `"degraded"`.

    ResearchPlan:
      type: object
      required: [title, summary, sections]
      properties:
        title:
          type: string
          minLength: 1
        summary:
          type: string
          minLength: 1
        sections:
          type: array
          minItems: 1
          maxItems: 9
          items:
            type: object
            required: [id, title, description]
            properties:
              id:
                type: string
              title:
                type: string
                minLength: 1
              description:
                type: string

    ResearchJob:
      type: object
      properties:
        id:
          type: string
        query:
          type: string
        status:
          type: string
          enum: [pending, planning, searching, reading, writing, completed, failed, cancelled]
        startedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        phase:
          type: string
        plan:
          $ref: "#/components/schemas/ResearchPlan"
        subQueries:
          type: array
          items:
            type: string
        sources:
          type: array
          items:
            type: object
        report:
          type: string
          description: Final markdown report (empty until status is `completed`).
        stats:
          type: object
          properties:
            totalPagesRead:
              type: integer
            totalPagesSucceeded:
              type: integer
            roundsCompleted:
              type: integer
        error:
          type: string
          nullable: true

    Session:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        summary:
          type: string
          nullable: true
        status:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ActiveJob:
      type: object
      properties:
        id:
          type: string
        query:
          type: string
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        stats:
          type: object
          properties:
            totalPagesRead:
              type: integer
            totalPagesSucceeded:
              type: integer
            roundsCompleted:
              type: integer

    ConsentRecord:
      type: object
      properties:
        key:
          type: string
          enum:
            - termsOfService
            - privacyPolicy
            - memoryExtraction
            - marketing
            - ageConfirmation
        granted:
          type: boolean
        timestamp:
          type: string
          format: date-time
          nullable: true
          description: When the consent was last set (null if never set).
        version:
          type: string
          nullable: true
          description: Policy version stamp at the time of consent.

    ConsentLedger:
      type: object
      properties:
        ok:
          type: boolean
        userId:
          type: string
        consents:
          type: object
          properties:
            termsOfService:
              $ref: "#/components/schemas/ConsentRecord"
            privacyPolicy:
              $ref: "#/components/schemas/ConsentRecord"
            memoryExtraction:
              $ref: "#/components/schemas/ConsentRecord"
            marketing:
              $ref: "#/components/schemas/ConsentRecord"
            ageConfirmation:
              $ref: "#/components/schemas/ConsentRecord"

    AccountExport:
      type: object
      description: |
        GDPR Art. 20 data portability payload. All user-owned records
        are included; connector credentials are **decrypted** so the
        user can take them to another provider.
      properties:
        format:
          type: string
          example: quaesitor-account-export
        version:
          type: integer
          example: 1
        exportedAt:
          type: string
          format: date-time
        userId:
          type: string
        conversations:
          type: array
          items:
            type: object
        memories:
          type: array
          items:
            type: object
        researchJobs:
          type: array
          items:
            type: object
        documents:
          type: array
          items:
            type: object
        projects:
          type: array
          items:
            type: object
        subscriptions:
          type: array
          items:
            type: object
        usageRecords:
          type: array
          items:
            type: object
        preferences:
          type: object
          nullable: true
        auditLogs:
          type: array
          items:
            type: object
        artifactStorage:
          type: array
          items:
            type: object

    McpServer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        installed:
          type: boolean
          description: Whether this server is currently marked installed.
        homepage:
          type: string
          format: uri

    Metrics:
      type: object
      properties:
        ok:
          type: boolean
        generatedAt:
          type: string
          format: date-time
        users:
          type: object
          properties:
            total:
              type: integer
            active7d:
              type: integer
            active30d:
              type: integer
        research:
          type: object
          properties:
            totalJobs:
              type: integer
            completed:
              type: integer
            failed:
              type: integer
            successRate:
              type: number
              description: 0..1 (rounded to 3 decimal places).
            avgDurationMs:
              type: integer
        chat:
          type: object
          properties:
            totalUserMessages:
              type: integer
            totalAssistantMessages:
              type: integer
            totalTokens:
              type: integer
        cache:
          type: object
          properties:
            hitRate:
              type: number
            size:
              type: integer
        carbon:
          type: object
          properties:
            gramsThisMonth:
              type: number
            local:
              type: boolean
            source:
              type: string
        planDistribution:
          type: object
          properties:
            free:
              type: integer
            pro:
              type: integer
            team:
              type: integer
            enterprise:
              type: integer

    Subscription:
      type: object
      description: |
        The authenticated user's subscription state. Mirrored from
        Stripe via the webhook — the cache is the source of truth for
        the plan-limit gate.
      properties:
        plan:
          type: string
          enum: [free, pro, team, enterprise]
        status:
          type: string
          enum: [none, active, trialing, past_due, canceled, incomplete]
        stripeCustomerId:
          type: string
          nullable: true
        stripeSubscriptionId:
          type: string
          nullable: true
        currentPeriodStart:
          type: string
          format: date-time
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
          default: false

    ApiKey:
      type: object
      description: |
        Metadata for an API key. The secret itself is NEVER included —
        only the bcrypt hash is stored at rest, and the plaintext is
        shown to the user exactly once at creation time.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Human label.
        scopes:
          type: array
          items: { type: string }
          description: Scope strings (e.g. `chat:write`, `research:write`, `read`).
        prefix:
          type: string
          description: First 8 chars of the key (e.g. `qsk_abcd`) — used to identify which key made a request without exposing the secret.
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
        lastUsedIp:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
          description: URL-safe slug.
        ownerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    WorkspaceMembership:
      type: object
      description: A user's membership in a workspace, with role.
      properties:
        workspace:
          $ref: "#/components/schemas/Workspace"
        role:
          type: string
          enum: [owner, admin, editor, viewer]
        joinedAt:
          type: string
          format: date-time

    Memory:
      type: object
      description: |
        A long-term memory record (layer 2 of the 5-layer memory
        system). The `content` is the raw memory text; `kind`
        classifies it for recall filters.
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        content:
          type: string
          description: The memory text (max 2000 chars).
        kind:
          type: string
          enum: [preference, fact, event, relationship, skill]
        source:
          type: string
          description: |
            How the memory was created — `manual` (via `POST /api/memories`),
            `extractor` (auto-extracted from chat), `import` (bulk import).
        createdAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Set when soft-deleted. Null when active.

    AuditLog:
      type: object
      description: |
        A single audit-log entry — one row per security-sensitive
        action. The `action` string follows a `domain.verb` convention
        (e.g. `apikey.create`, `auth.login`, `billing.checkout.start`).
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          nullable: true
          description: Null for unauthenticated actions (e.g. failed login).
        action:
          type: string
          description: The audit action key (e.g. `apikey.create`).
        target:
          type: string
          nullable: true
          description: The resource id acted upon (e.g. the API key id).
        ip:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
          description: Action-specific context (never secrets — those are redacted).
        createdAt:
          type: string
          format: date-time

    Document:
      type: object
      description: |
        Metadata for an uploaded document. The actual file contents
        are stored separately (S3-compatible or local filesystem);
        this row is the index.
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        title:
          type: string
        filename:
          type: string
          description: The original uploaded filename.
        mimeType:
          type: string
          description: Verified MIME type (e.g. `application/pdf`).
        sizeBytes:
          type: integer
        storageKey:
          type: string
          description: The object-storage key (S3 / local path).
        createdAt:
          type: string
          format: date-time

    VideoAnalysis:
      type: object
      description: |
        The structured result of a video analysis — keyframes +
        transcript + metadata, ready to feed into a vision model.
      properties:
        duration:
          type: number
          description: Total duration in seconds.
        keyframes:
          type: array
          items:
            $ref: "#/components/schemas/VideoKeyframe"
        transcript:
          $ref: "#/components/schemas/VideoTranscript"
          nullable: true
        metadata:
          type: object
          properties:
            width: { type: integer }
            height: { type: integer }
            fps: { type: number }
            codec: { type: string }
        summary:
          type: string
          description: Optional natural-language summary (vision-model generated).
        scenes:
          type: array
          items:
            type: object
            properties:
              start: { type: number }
              end: { type: number }
              label: { type: string }

    VideoKeyframe:
      type: object
      properties:
        timestamp:
          type: number
          description: Frame timestamp in seconds.
        base64:
          type: string
          description: JPEG thumbnail as base64 (no data-URI prefix).
        description:
          type: string
          nullable: true
          description: Optional vision-model description of the frame.

    VideoTranscript:
      type: object
      properties:
        segments:
          type: array
          items:
            type: object
            properties:
              start: { type: number }
              end: { type: number }
              text: { type: string }
        fullText:
          type: string
          description: All segments joined with a space.
