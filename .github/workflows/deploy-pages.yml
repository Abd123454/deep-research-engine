# Deploy static showcase site to GitHub Pages.
#
# Triggers:
#   - Every push to main (auto-update after each change)
#   - Manual dispatch via Actions tab
#
# The deployed site is a static showcase page (static-site/index.html)
# that displays all features, architecture, and quick-start instructions.
# It auto-updates whenever code is pushed to main.
#
# Note: The full Next.js app (with API routes, database, SSE) cannot run
# on GitHub Pages (static-only hosting). The showcase page links to the
# repo for self-hosting instructions.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./static-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
