# CI pipeline: lint + typecheck + test on every push and PR.
# Runs on Node 20 (matches .nvmrc and engines field).
#
# Two parallel jobs:
#   - ci:        the canonical run using Bun (the primary dev runtime)
#   - npm-test:  a compatibility run using plain npm + Node, so that
#                contributors who don't have Bun installed don't
#                silently break the npm install / lint / test path.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: bun run test

  npm-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run lint
      - run: npm test

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ESLint security rules
        run: bun run lint
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
