# Docker Compose for Deep Research Engine.
#
# Usage:
#   1. Copy .env.example to .env and fill in NVIDIA_API_KEY
#   2. docker compose up -d
#   3. Open http://localhost:3000
#
# Health check uses the /api/health endpoint.

services:
  deep-research:
    build: .
    container_name: deep-research
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
